<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeGo | Student Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { 
            --bg: #0f172a; --card: #1e293b; --blue: #3b82f6; 
            --amber: #fbbc04; --red: #ef4444; --slate: #94a3b8; --white: #ffffff;
            --glass: rgba(30, 41, 59, 0.7);
        }

        body { 
            font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif; background: var(--bg); 
            color: var(--white); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; 
        }

        .container { width: 100%; max-width: 450px; padding-bottom: 80px; }

        /* Modern Card with Glassmorphism */
        .card { 
            background: var(--card); padding: 20px; border-radius: 20px; 
            margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .input-field { 
            width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; 
            border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; font-size: 1rem;
        }

        .btn { 
            width: 100%; padding: 14px; background: var(--blue); color: white; 
            border: none; border-radius: 12px; cursor: pointer; font-weight: 700; transition: 0.3s;
        }

        .btn-secondary { background: #334155; color: white; }
        .btn-amber { background: var(--amber); color: #000; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }

        /* Tabs Navigation */
        .tab-bar { display: flex; gap: 10px; margin-bottom: 25px; background: #1e293b; padding: 5px; border-radius: 15px; }
        .tab { 
            flex: 1; padding: 12px; text-align: center; border-radius: 12px; 
            cursor: pointer; font-size: 0.9rem; transition: 0.3s; font-weight: 600; color: var(--slate);
        }
        .tab.active { background: var(--blue); color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }

        /* List Items */
        .booking-item { 
            background: rgba(255,255,255,0.03); padding: 18px; border-radius: 15px; 
            margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; 
            border: 1px solid rgba(255,255,255,0.05);
        }

        .status-pill { padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; }
        .status-pending { background: rgba(148, 163, 184, 0.2); color: var(--slate); }
        .status-accepted { background: rgba(34, 197, 94, 0.2); color: #22c55e; }

        /* Floating Chat UI (Modern Style) */
        #chatPanel {
            position: fixed; bottom: 0; left: 0; right: 0; top: 0;
            background: var(--bg); z-index: 2000; display: none; flex-direction: column;
        }
        .chat-header { padding: 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #334155; }
        #chatMessages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .bubble { padding: 12px 16px; border-radius: 18px; max-width: 75%; font-size: 0.95rem; line-height: 1.4; }
        .bubble.me { align-self: flex-end; background: var(--blue); border-bottom-right-radius: 4px; }
        .bubble.them { align-self: flex-start; background: #334155; border-bottom-left-radius: 4px; }

        /* Custom Modal for Info */
        #infoModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 3000;
        }
        .modal-content { background: var(--card); width: 90%; max-width: 350px; padding: 25px; border-radius: 25px; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <div id="loginArea">
            <div style="text-align: center; margin-top: 50px;">
                <span style="font-size: 4rem;">🚗</span>
                <h1 style="margin: 10px 0 5px 0; font-size: 2.5rem; letter-spacing: -1px;">SeGo</h1>
                <p style="color: var(--slate); margin-bottom: 40px;">Campus Carpool Made Easy</p>
            </div>
            <div class="card">
                <input type="text" id="stuID" class="input-field" placeholder="Student ID">
                <input type="text" id="stuName" class="input-field" placeholder="Your Name">
                <button class="btn" onclick="login()">Get Started</button>
            </div>
        </div>

        <div id="mainApp" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <div>
                    <small style="color: var(--slate); display: block;">Good day,</small>
                    <b id="displayStuName" style="font-size: 1.2rem;"></b>
                </div>
                <div onclick="logout()" style="background: rgba(239, 68, 68, 0.1); color: var(--red); padding: 8px 15px; border-radius: 10px; font-size: 0.8rem; font-weight: bold; cursor: pointer;">LOGOUT</div>
            </div>

            <div class="tab-bar">
                <div class="tab active" id="tabInstant" onclick="switchTab('instant')">Instant Ride</div>
                <div class="tab" id="tabBooking" onclick="switchTab('booking')">Pre-Book</div>
            </div>

            <div id="instantSection">
                <h3 style="margin-bottom: 15px;">Available Drivers</h3>
                <div id="driverList">Searching for drivers...</div>
            </div>

            <div id="bookingSection" style="display: none;">
                <div class="card" style="border-top: 4px solid var(--amber); background: linear-gradient(145deg, #1e293b, #111b2d);">
                    <h4 style="margin: 0 0 15px 0;">Schedule a Trip</h4>
                    <input type="date" id="bookDate" class="input-field">
                    <input type="time" id="bookTime" class="input-field">
                    <input type="text" id="bookDest" class="input-field" placeholder="Where is the destination?">
                    <button class="btn btn-amber" onclick="submitBooking()">Schedule Request</button>
                </div>
                <h3 style="margin: 25px 0 15px 0;">My Schedule</h3>
                <div id="myBookingsList"></div>
            </div>
        </div>
    </div>

    <div id="infoModal">
        <div class="modal-content">
            <div style="font-size: 3rem; margin-bottom: 10px;">👤</div>
            <h2 id="modalName" style="margin: 0;"></h2>
            <p id="modalCar" style="color: var(--slate); margin: 5px 0 20px 0;"></p>
            <div style="display: flex; justify-content: space-around; background: #0f172a; padding: 15px; border-radius: 15px; margin-bottom: 20px;">
                <div><small style="color: var(--slate);">PLATE</small><div id="modalPlate" style="font-weight:bold;"></div></div>
                <div><small style="color: var(--slate);">RATING</small><div style="font-weight:bold; color:var(--amber);">⭐ <span id="modalRating"></span></div></div>
            </div>
            <button class="btn btn-secondary" onclick="closeModal()">Close</button>
        </div>
    </div>

    <div id="chatPanel">
        <div class="chat-header">
            <button onclick="closeChat()" style="background:none; border:none; color:white; font-size: 1.5rem; cursor:pointer;">←</button>
            <div>
                <b id="chatWith" style="display:block;">Driver</b>
                <small style="color: var(--blue);">Online</small>
            </div>
        </div>
        <div id="chatMessages"></div>
        <div style="padding: 20px; border-top: 1px solid #334155; display: flex; gap: 10px;">
            <input type="text" id="chatInput" class="input-field" style="margin:0;" placeholder="Write a message...">
            <button onclick="sendMsg()" style="background:var(--blue); width: 60px; border-radius: 12px; border:none; color:white; font-weight:bold;">></button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCU3QzjiDpL4U3825XtERth6PFlJ1tsZtg",
            databaseURL: "https://carpool-uitm-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "carpool-uitm"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = JSON.parse(localStorage.getItem('sego_user'));
        let activeChatId = null;

        // --- AUTH ---
        function login() {
            const id = document.getElementById('stuID').value.trim();
            const name = document.getElementById('stuName').value.trim();
            if(!id || !name) return alert("Please enter details");
            currentUser = { id, name };
            localStorage.setItem('sego_user', JSON.stringify(currentUser));
            location.reload();
        }
        function logout() { localStorage.clear(); location.reload(); }

        if(currentUser) {
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('displayStuName').innerText = currentUser.name;
            syncData();
        }

        function switchTab(t) {
            document.getElementById('instantSection').style.display = t === 'instant' ? 'block' : 'none';
            document.getElementById('bookingSection').style.display = t === 'booking' ? 'block' : 'none';
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('active');
        }

        // --- SYNC ---
        function syncData() {
            db.ref('drivers').on('value', snap => {
                const drivers = snap.val();
                let html = "";
                let myBooked = localStorage.getItem('booked_driver_id');
                
                if(drivers) {
                    const activeTrip = Object.values(drivers).find(d => d.id === myBooked && d.status === 'BOOKED');
                    if(activeTrip) {
                        html = `<div class="card" style="border-left:5px solid var(--amber); background: rgba(251, 188, 4, 0.05);">
                            <h3 style="margin:0 0 10px 0; color:var(--amber);">Active Trip</h3>
                            <p style="margin-bottom:20px;">You are riding with <b>${activeTrip.name}</b></p>
                            <div style="display:flex; gap:10px;">
                                <button class="btn" onclick="openChatBox('${activeTrip.id}', '${activeTrip.name}')">Chat Driver</button>
                                <button class="btn btn-secondary" style="color:var(--red);" onclick="cancelInstant('${activeTrip.id}')">Cancel</button>
                            </div>
                        </div>`;
                    } else {
                        localStorage.removeItem('booked_driver_id');
                        Object.values(drivers).forEach(d => {
                            if(d && d.status === "ON") {
                                html += `<div class="card">
                                    <div style="display:flex; justify-content:space-between; align-items:center;">
                                        <div>
                                            <b style="font-size:1.1rem;">${d.name}</b><br>
                                            <small style="color:var(--slate);">${d.car}</small>
                                        </div>
                                        <div style="text-align:right;">
                                            <button onclick="showInfo('${d.id}')" style="background:none; border:none; color:var(--blue); font-weight:bold; cursor:pointer;">INFO</button>
                                        </div>
                                    </div>
                                    <button class="btn" style="margin-top:15px;" onclick="bookInstant('${d.id}')">Request Ride</button>
                                </div>`;
                            }
                        });
                    }
                }
                document.getElementById('driverList').innerHTML = html || "<p style='text-align:center; color:var(--slate); padding:40px;'>No drivers online at the moment.</p>";
            });

            db.ref('bookings').on('value', snap => {
                let html = "";
                snap.forEach(child => {
                    const b = child.val();
                    const bid = child.key;
                    if(b.student_id === currentUser.id) {
                        let btn = b.status === "PENDING" 
                            ? `<button onclick="cancelPreBook('${bid}')" style="background:none; border:none; color:var(--red); font-size:0.7rem; font-weight:bold;">CANCEL</button>`
                            : `<button onclick="openChatBox('${bid}', 'Driver')" style="background:var(--blue); border:none; color:white; border-radius:8px; padding:5px 12px; font-size:0.7rem; font-weight:bold;">CHAT</button>`;
                        
                        html += `<div class="booking-item">
                            <div>
                                <b style="font-size:0.9rem;">${b.date} • ${b.time}</b><br>
                                <small style="color:var(--slate);">📍 ${b.dest}</small>
                            </div>
                            <div style="text-align:right;">
                                <div class="status-pill status-${b.status.toLowerCase()}">${b.status}</div>
                                <div style="margin-top:8px;">${btn}</div>
                            </div>
                        </div>`;
                    }
                });
                document.getElementById('myBookingsList').innerHTML = html || "<p style='text-align:center; color:var(--slate);'>No scheduled trips.</p>";
            });
        }

        // --- ACTIONS ---
        async function showInfo(id) {
            const s = await db.ref('drivers/' + id).get();
            if(s.exists()) {
                const d = s.val();
                document.getElementById('modalName').innerText = d.name;
                document.getElementById('modalCar').innerText = d.car;
                document.getElementById('modalPlate').innerText = d.plate || 'N/A';
                document.getElementById('modalRating').innerText = d.rating || '5.0';
                document.getElementById('infoModal').style.display = 'flex';
            }
        }
        function closeModal() { document.getElementById('infoModal').style.display = 'none'; }

        async function bookInstant(id) {
            if(confirm("Confirm ride request?")) {
                localStorage.setItem('booked_driver_id', id);
                await db.ref('drivers/' + id).update({ status: 'BOOKED' });
            }
        }

        async function submitBooking() {
            const date = document.getElementById('bookDate').value;
            const time = document.getElementById('bookTime').value;
            const dest = document.getElementById('bookDest').value;
            if(!date || !time || !dest) return alert("Fill all fields");
            await db.ref('bookings').push({
                student_id: currentUser.id, student_name: currentUser.name,
                date, time, dest, status: 'PENDING'
            });
            alert("Booking submitted successfully!");
        }

        async function cancelInstant(id) {
            if(confirm("Cancel this ride?")) {
                await db.ref('drivers/' + id).update({ status: 'ON' });
                await db.ref('chats/' + id).remove();
                localStorage.removeItem('booked_driver_id');
            }
        }

        async function cancelPreBook(bid) {
            if(confirm("Cancel this schedule?")) await db.ref('bookings/' + bid).remove();
        }

        // --- CHAT SYSTEM ---
        function openChatBox(id, name) {
            activeChatId = id;
            document.getElementById('chatWith').innerText = name;
            document.getElementById('chatPanel').style.display = 'flex';
            db.ref('chats/' + id).on('value', snap => {
                let h = "";
                snap.forEach(m => {
                    const msg = m.val();
                    h += `<div class="bubble ${msg.sender === 'student' ? 'me' : 'them'}">${msg.text}</div>`;
                });
                const box = document.getElementById('chatMessages');
                box.innerHTML = h;
                box.scrollTop = box.scrollHeight;
            });
        }

        function closeChat() { 
            document.getElementById('chatPanel').style.display = 'none'; 
            if(activeChatId) db.ref('chats/' + activeChatId).off();
        }

        function sendMsg() {
            const input = document.getElementById('chatInput');
            if(!input.value.trim() || !activeChatId) return;
            db.ref('chats/' + activeChatId).push({
                sender: 'student', text: input.value, timestamp: Date.now()
            });
            input.value = "";
        }
    </script>
</body>
</html>
