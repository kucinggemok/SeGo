<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeGo | Student Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { 
            --bg: #0f172a; --card: #1e293b; --blue: #3b82f6; 
            --amber: #fbbc04; --red: #ef4444; --slate: #94a3b8; --white: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); 
            color: var(--white); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; 
        }

        .container { width: 100%; max-width: 450px; }

        .card { 
            background: var(--card); padding: 20px; border-radius: 15px; 
            margin-bottom: 15px; border: 1px solid #334155; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .input-field { 
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; 
            border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; 
        }

        .btn { 
            width: 100%; padding: 12px; background: var(--blue); color: white; 
            border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }

        .tab-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { 
            flex: 1; padding: 12px; text-align: center; background: #1e293b; 
            border-radius: 10px; cursor: pointer; font-size: 0.9rem; border: 1px solid #334155; 
        }
        .tab.active { background: var(--blue); font-weight: bold; }

        /* Modal / Panel */
        #chatPanel, #ratingModal, #infoModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 3000; display: none; align-items: center; justify-content: center;
        }
        .modal-box { background: var(--card); width: 85%; padding: 25px; border-radius: 20px; text-align: center; border: 1px solid var(--blue); }
        
        #chatPanel { flex-direction: column; background: var(--bg); display: none; }
        .chat-header { background: var(--blue); padding: 20px; width: 100%; display: flex; align-items: center; box-sizing: border-box; }
        #chatMessages { flex: 1; padding: 20px; width: 100%; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; box-sizing: border-box; }
        .bubble { padding: 10px 15px; border-radius: 15px; max-width: 75%; }
        .bubble.me { align-self: flex-end; background: var(--blue); }
        .bubble.them { align-self: flex-start; background: #334155; }

        .booking-item { 
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; 
            margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--slate);
        }
        .status-pill { padding: 4px 10px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .pending { background: #475569; }
        .accepted { background: #22c55e; }
    </style>
</head>
<body>

    <div class="container">
        <div id="loginArea">
            <h1 style="text-align: center;">🚗 SeGo</h1>
            <div class="card">
                <input type="text" id="stuID" class="input-field" placeholder="Student ID">
                <input type="text" id="stuName" class="input-field" placeholder="Full Name">
                <button class="btn" onclick="login()">Login</button>
            </div>
        </div>

        <div id="mainApp" style="display: none;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <span>Welcome, <b id="displayStuName"></b></span>
                <button onclick="logout()" style="background:none; border:none; color:var(--red); cursor:pointer;">Logout</button>
            </div>

            <div class="tab-bar">
                <div class="tab active" id="tabInstant" onclick="switchTab('instant')">Instant Ride</div>
                <div class="tab" id="tabBooking" onclick="switchTab('booking')">Pre-Book</div>
            </div>

            <div id="instantSection">
                <div id="driverList">Searching...</div>
            </div>

            <div id="bookingSection" style="display: none;">
                <div class="card">
                    <h4 style="margin-top:0">Schedule Booking</h4>
                    <input type="date" id="bookDate" class="input-field">
                    <input type="time" id="bookTime" class="input-field">
                    <input type="text" id="bookDest" class="input-field" placeholder="Destination">
                    <button class="btn" style="background:var(--amber); color:black" onclick="submitBooking()">Request Booking</button>
                </div>
                <h3>My Bookings</h3>
                <div id="myBookingsList"></div>
            </div>
        </div>
    </div>

    <div id="infoModal">
        <div class="modal-box">
            <div style="font-size: 3rem;">👤</div>
            <h2 id="modalName"></h2>
            <p id="modalID" style="color: var(--slate);"></p>
            <div style="background: #0f172a; padding: 15px; border-radius: 15px; margin-bottom: 20px;">
                <div style="font-size: 1.5rem; color:var(--amber);">⭐ <span id="modalRating"></span></div>
            </div>
            <button class="btn" style="background:#334155" onclick="closeModal()">Close</button>
        </div>
    </div>

    <div id="ratingModal">
        <div class="modal-box">
            <h2>Trip Ended!</h2>
            <p>Please rate your experience:</p>
            <select id="rateValue" class="input-field" style="text-align: center; font-size: 1.2rem;">
                <option value="5">⭐⭐⭐⭐⭐ (5/5)</option>
                <option value="4">⭐⭐⭐⭐ (4/5)</option>
                <option value="3">⭐⭐⭐ (3/5)</option>
                <option value="2">⭐⭐ (2/5)</option>
                <option value="1">⭐ (1/5)</option>
            </select>
            <input type="text" id="rateFeedback" class="input-field" placeholder="Any feedback?">
            <button class="btn" onclick="submitRating()">Submit Rating</button>
        </div>
    </div>

    <div id="chatPanel">
        <div class="chat-header">
            <button onclick="closeChat()" style="background:none; border:none; color:white; cursor:pointer;">← Back</button>
            <b id="chatWith" style="margin-left:10px;">Driver</b>
        </div>
        <div id="chatMessages"></div>
        <div style="padding: 15px; display: flex; gap: 10px; width: 100%; box-sizing: border-box;">
            <input type="text" id="chatInput" class="input-field" style="margin:0;" placeholder="Message...">
            <button onclick="sendMsg()" style="background:var(--blue); border:none; color:white; padding:0 15px; border-radius:10px;">Send</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCU3QzjiDpL4U3825XtERth6PFlJ1tsZtg",
            databaseURL: "https://carpool-uitm-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "carpool-uitm"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = JSON.parse(localStorage.getItem('sego_user'));
        let activeChatId = null;

        // AUTH
        function login() {
            const id = document.getElementById('stuID').value.trim();
            const name = document.getElementById('stuName').value.trim();
            if(!id || !name) return alert("Fill all fields");
            currentUser = { id, name };
            localStorage.setItem('sego_user', JSON.stringify(currentUser));
            location.reload();
        }
        function logout() { localStorage.clear(); location.reload(); }

        if(currentUser) {
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('displayStuName').innerText = currentUser.name;
            syncData();
        }

        function switchTab(t) {
            document.getElementById('instantSection').style.display = t === 'instant' ? 'block' : 'none';
            document.getElementById('bookingSection').style.display = t === 'booking' ? 'block' : 'none';
            document.getElementById('tabInstant').className = t === 'instant' ? 'tab active' : 'tab';
            document.getElementById('tabBooking').className = t === 'booking' ? 'tab active' : 'tab';
        }

        function syncData() {
            db.ref('drivers').on('value', snap => {
                const drivers = snap.val();
                let html = "";
                let bookedId = localStorage.getItem('booked_driver_id');

                if(drivers) {
                    const activeTrip = Object.values(drivers).find(d => d && d.id === bookedId);
                    
                    // LOGIC: Kalau trip sedang berjalan
                    if(activeTrip && activeTrip.status === 'BOOKED') {
                        html = `<div class="card" style="border-left:5px solid var(--amber);">
                            <h4>Ongoing Ride with ${activeTrip.name}</h4>
                            <div style="display:flex; flex-direction:column; gap:8px;">
                                <button class="btn" onclick="openChatBox('${activeTrip.id}', '${activeTrip.name}')">CHAT</button>
                                <button class="btn" style="background:var(--amber); color:black;" onclick="finishTripManual('${activeTrip.id}')">FINISH TRIP</button>
                                <button class="btn" style="background:var(--red);" onclick="cancelInstant('${activeTrip.id}')">CANCEL</button>
                            </div>
                        </div>`;
                    } 
                    // LOGIC: Kalau driver dah tekan "Finish" di side dia
                    else if (bookedId && (!activeTrip || activeTrip.status === 'ON')) {
                        // Tunjukkan modal rating secara paksa
                        localStorage.setItem('pending_rating_id', bookedId);
                        localStorage.removeItem('booked_driver_id');
                        document.getElementById('ratingModal').style.display = 'flex';
                    }
                    else {
                        Object.values(drivers).forEach(d => {
                            if(d && d.name && d.status === "ON") {
                                html += `<div class="card">
                                    <b>${d.name}</b><br><small>${d.car} • ${d.plate}</small>
                                    <div style="display:flex; gap:10px; margin-top:15px;">
                                        <button class="btn" onclick="bookInstant('${d.id}')">BOOK NOW</button>
                                        <button class="btn" style="background:#475569" onclick="showInfo('${d.id}')">INFO</button>
                                    </div>
                                </div>`;
                            }
                        });
                    }
                }
                document.getElementById('driverList').innerHTML = html || "No drivers online.";
            });

            // Pre-bookings sync (sama macam asal)
            db.ref('bookings').on('value', snap => {
                let html = "";
                snap.forEach(child => {
                    const b = child.val();
                    if(b.student_id === currentUser.id) {
                        html += `<div class="booking-item">
                            <div><b>${b.date} • ${b.time}</b><br><small>${b.dest}</small></div>
                            <div class="status-pill ${b.status.toLowerCase()}">${b.status}</div>
                        </div>`;
                    }
                });
                document.getElementById('myBookingsList').innerHTML = html || "No bookings.";
            });
        }

        // FINISH TRIP LOGIC
        function finishTripManual(id) {
            if(confirm("End this trip?")) {
                localStorage.setItem('pending_rating_id', id);
                db.ref('drivers/' + id).update({ status: 'ON' });
                db.ref('chats/' + id).remove();
                localStorage.removeItem('booked_driver_id');
                document.getElementById('ratingModal').style.display = 'flex';
            }
        }

        async function submitRating() {
            const driverId = localStorage.getItem('pending_rating_id');
            const rate = document.getElementById('rateValue').value;
            const feedback = document.getElementById('rateFeedback').value;
            
            if(driverId) {
                await db.ref('drivers/' + driverId + '/feedbacks').push({
                    student: currentUser.name,
                    rating: rate,
                    comment: feedback,
                    timestamp: Date.now()
                });
            }

            localStorage.removeItem('pending_rating_id');
            document.getElementById('ratingModal').style.display = 'none';
            alert("Rating submitted! Thank you.");
        }

        async function bookInstant(id) {
            if(!confirm("Book now?")) return;
            localStorage.setItem('booked_driver_id', id);
            await db.ref('drivers/' + id).update({ status: 'BOOKED' });
        }

        async function cancelInstant(id) {
            if(confirm("Cancel ride?")) {
                await db.ref('drivers/' + id).update({ status: 'ON' });
                await db.ref('chats/' + id).remove();
                localStorage.removeItem('booked_driver_id');
            }
        }

        async function showInfo(id) {
            const s = await db.ref('drivers/' + id).get();
            if(s.exists()) {
                const d = s.val();
                document.getElementById('modalName').innerText = d.name;
                document.getElementById('modalID').innerText = "ID: " + (d.id_student || "N/A");
                document.getElementById('modalRating').innerText = d.rating || '5.0';
                document.getElementById('infoModal').style.display = 'flex';
            }
        }
        function closeModal() { document.getElementById('infoModal').style.display = 'none'; }

        // CHAT
        function openChatBox(id, name) {
            activeChatId = id;
            document.getElementById('chatWith').innerText = name;
            document.getElementById('chatPanel').style.display = 'flex';
            db.ref('chats/' + id).on('value', snap => {
                let h = "";
                snap.forEach(m => {
                    const msg = m.val();
                    h += `<div class="bubble ${msg.sender === 'student' ? 'me' : 'them'}">${msg.text}</div>`;
                });
                const box = document.getElementById('chatMessages');
                box.innerHTML = h;
                box.scrollTop = box.scrollHeight;
            });
        }
        function closeChat() { 
            document.getElementById('chatPanel').style.display = 'none'; 
            if(activeChatId) db.ref('chats/' + activeChatId).off();
        }
        function sendMsg() {
            const input = document.getElementById('chatInput');
            if(!input.value.trim() || !activeChatId) return;
            db.ref('chats/' + activeChatId).push({ sender: 'student', text: input.value });
            input.value = "";
        }
    </script>
</body>
</html>
