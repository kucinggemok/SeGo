<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student | UiTM Carpool</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --blue: #3b82f6; --amber: #f59e0b; --slate: #94a3b8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding: 20px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .container { width: 100%; max-width: 450px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 5px solid var(--blue); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .booking-card { border-left-color: var(--amber); background: rgba(245, 158, 11, 0.05); border: 1px solid var(--amber); }
        .btn { width: 100%; padding: 12px; background: var(--blue); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        
        /* Live Chat Styles */
        #chatBox { background: rgba(15, 23, 42, 0.8); border-radius: 10px; height: 180px; overflow-y: auto; padding: 10px; margin: 15px 0; border: 1px solid #334155; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px 12px; border-radius: 12px; max-width: 80%; font-size: 0.9rem; line-height: 1.4; }
        .msg.me { align-self: flex-end; background: var(--blue); color: white; border-bottom-right-radius: 2px; }
        .msg.them { align-self: flex-start; background: #334155; color: white; border-bottom-left-radius: 2px; }
        .chat-input-area { display: flex; gap: 8px; margin-top: 10px; }
        .chat-input-area input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align: center;">🚗 UiTM Carpool</h1>
        <p style="text-align: center; color: var(--slate); margin-top: -15px; margin-bottom: 30px;"></p>
        <div id="list">Connecting...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCU3QzjiDpL4U3825XtERth6PFlJ1tsZtg",
            databaseURL: "https://carpool-uitm-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "carpool-uitm"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('drivers').on('value', (snapshot) => {
            const data = snapshot.val();
            let myBookedId = localStorage.getItem('booked_driver_id');
            let html = "";

            if (data) {
                const driversArray = Object.values(data);
                const activeTrip = driversArray.find(d => d.id === myBookedId && d.status === 'BOOKED');

                if (activeTrip) {
                    html = `
                        <div class="card booking-card">
                            <h2 style="color:var(--amber); margin-top:0;">Trip Confirmed</h2>
                            <p style="margin:0;">Driver: <b>${activeTrip.name}</b></p>
                            <p style="margin:5px 0; font-size:0.9rem; color:var(--slate);">${activeTrip.car} • ${activeTrip.plate}</p>
                            
                            <div id="chatBox"></div>
                            
                            <div class="chat-input-area">
                                <input type="text" id="chatInput" placeholder="Ask about price/time...">
                                <button onclick="sendChat('${activeTrip.id}')" style="padding:10px 15px; background:var(--blue); border:none; border-radius:8px; color:white; font-weight:bold;">Send</button>
                            </div>
                            
                            <button class="btn" style="background:#475569; margin-top:20px;" onclick="finishTrip('${activeTrip.id}')">FINISH TRIP</button>
                        </div>
                    `;
                    loadChats(activeTrip.id);
                } else {
                    localStorage.removeItem('booked_driver_id');
                    const online = driversArray.filter(d => d.status === 'ON');
                    if(online.length > 0) {
                        online.forEach(d => {
                            html += `
                                <div class="card">
                                    <h3>${d.name}</h3>
                                    <p style="color:var(--slate);">${d.car} [${d.plate}]</p>
                                    <button class="btn" onclick="book('${d.id}')">BOOK NOW</button>
                                </div>`;
                        });
                    } else {
                        html = "<div style='text-align:center; padding-top:50px; color:var(--slate);'><h3>No drivers online</h3><p>Try again later.</p></div>";
                    }
                }
            }
            document.getElementById('list').innerHTML = html;
        });

        async function book(id) {
            if(!confirm("Book this driver?")) return;
            localStorage.setItem('booked_driver_id', id);
            await db.ref('drivers/' + id).update({ status: 'BOOKED', msg: 'New Booking!' });
        }

        async function sendChat(driverId) {
            const input = document.getElementById('chatInput');
            if(!input.value.trim()) return;
            await db.ref('chats/' + driverId).push({ sender: 'student', text: input.value, time: Date.now() });
            input.value = "";
        }

        function loadChats(driverId) {
            db.ref('chats/' + driverId).on('value', (snap) => {
                const chatBox = document.getElementById('chatBox');
                if(!chatBox) return;
                let chatHtml = "";
                snap.forEach(child => {
                    const m = child.val();
                    const side = m.sender === 'student' ? 'me' : 'them';
                    chatHtml += `<div class="msg ${side}">${m.text}</div>`;
                });
                chatBox.innerHTML = chatHtml;
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        async function finishTrip(id) {
            if(confirm("End trip? This will clear chat history.")) {
                await db.ref('chats/' + id).remove();
                localStorage.removeItem('booked_driver_id');
                location.reload();
            }
        }
    </script>
</body>
</html>
