<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeGo | Student Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { 
            --bg: #0f172a; --card: #1e293b; --blue: #3b82f6; 
            --amber: #fbbc04; --red: #ef4444; --slate: #94a3b8; --white: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); 
            color: var(--white); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; 
        }

        .container { width: 100%; max-width: 450px; }

        .card { 
            background: var(--card); padding: 20px; border-radius: 15px; 
            margin-bottom: 15px; border: 1px solid #334155; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .input-field { 
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; 
            border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; 
        }

        /* Pax Selector Styling */
        .pax-container { display: flex; justify-content: space-around; margin: 15px 0; }
        .pax-btn {
            width: 50px; height: 50px; border-radius: 50%; border: 2px solid #334155;
            background: transparent; color: white; cursor: pointer; font-weight: bold;
            display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        .pax-btn.active { background: var(--blue); border-color: var(--blue); transform: scale(1.1); box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }

        .btn { 
            width: 100%; padding: 14px; background: var(--blue); color: white; 
            border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1rem;
        }

        .tab-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; text-align: center; background: #1e293b; border-radius: 10px; cursor: pointer; }
        .tab.active { background: var(--blue); font-weight: bold; }

        /* Searching Animation */
        .searching-box { text-align: center; padding: 40px 20px; }
        .loader {
            border: 4px solid #334155; border-top: 4px solid var(--blue);
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Modals */
        #ratingModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 3000; display: none; align-items: center; justify-content: center;
        }
        .modal-box { background: var(--card); width: 85%; padding: 25px; border-radius: 20px; text-align: center; }

        #chatPanel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 4000; display: none; flex-direction: column; }
    </style>
</head>
<body>

    <div class="container">
        <div id="loginArea">
            <h1 style="text-align: center;">🚗 SeGo</h1>
            <div class="card">
                <input type="text" id="stuID" class="input-field" placeholder="Student ID">
                <input type="text" id="stuName" class="input-field" placeholder="Full Name">
                <button class="btn" onclick="login()">Login</button>
            </div>
        </div>

        <div id="mainApp" style="display: none;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <span>Hi, <b id="displayStuName"></b></span>
                <button onclick="logout()" style="background:none; border:none; color:var(--red);">Logout</button>
            </div>

            <div class="tab-bar">
                <div class="tab active" id="tabInstant" onclick="switchTab('instant')">Instant</div>
                <div class="tab" id="tabBooking" onclick="switchTab('booking')">Pre-Book</div>
            </div>

            <div id="instantSection">
                <div id="requestForm" class="card">
                    <h4 style="margin:0">Where to?</h4>
                    <input type="text" id="pickupLoc" class="input-field" placeholder="Current Location (e.g. Kolej Perindu)">
                    <input type="text" id="dropLoc" class="input-field" placeholder="Destination (e.g. Fakulti Sains)">
                    
                    <p style="margin: 15px 0 5px 0; font-size: 0.9rem; color: var(--slate);">How many pax?</p>
                    <div class="pax-container">
                        <button class="pax-btn active" onclick="setPax(1, this)">1</button>
                        <button class="pax-btn" onclick="setPax(2, this)">2</button>
                        <button class="pax-btn" onclick="setPax(3, this)">3</button>
                        <button class="pax-btn" onclick="setPax(4, this)">4</button>
                    </div>

                    <button class="btn" onclick="findDriver()">FIND DRIVER</button>
                </div>

                <div id="searchingState" class="card searching-box" style="display: none;">
                    <div class="loader"></div>
                    <h3>Searching for Driver...</h3>
                    <p style="color: var(--slate);">Your request has been broadcasted to nearby drivers.</p>
                    <button class="btn" style="background: var(--red); margin-top: 20px;" onclick="cancelRequest()">CANCEL REQUEST</button>
                </div>

                <div id="tripActiveState" style="display: none;">
                    </div>
            </div>

            <div id="bookingSection" style="display: none;">
                <div class="card">
                    <h4>Schedule Booking</h4>
                    <input type="date" id="bookDate" class="input-field">
                    <input type="time" id="bookTime" class="input-field">
                    <input type="text" id="bookDest" class="input-field" placeholder="Destination">
                    <button class="btn" style="background:var(--amber); color:black" onclick="submitBooking()">Request Booking</button>
                </div>
                <h3>My Schedule</h3>
                <div id="myBookingsList"></div>
            </div>
        </div>
    </div>

    <div id="ratingModal">
        <div class="modal-box">
            <h2>Trip Completed!</h2>
            <p>Rate your driver:</p>
            <select id="rateValue" class="input-field"><option value="5">⭐⭐⭐⭐⭐</option><option value="4">⭐⭐⭐⭐</option><option value="3">⭐⭐⭐</option></select>
            <input type="text" id="rateFeedback" class="input-field" placeholder="Feedback...">
            <button class="btn" onclick="submitRating()">Submit</button>
        </div>
    </div>

    <div id="chatPanel">
        <div style="background: var(--blue); padding: 20px; display: flex; align-items: center;">
            <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:1.2rem;">←</button>
            <b style="margin-left:15px;" id="chatWith">Driver</b>
        </div>
        <div id="chatMessages" style="flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:10px;"></div>
        <div style="padding:15px; display:flex; gap:10px;">
            <input type="text" id="chatInput" class="input-field" style="margin:0" placeholder="Type...">
            <button class="btn" style="width:80px" onclick="sendMsg()">Send</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCU3QzjiDpL4U3825XtERth6PFlJ1tsZtg",
            databaseURL: "https://carpool-uitm-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "carpool-uitm"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = JSON.parse(localStorage.getItem('sego_user'));
        let selectedPax = 1;
        let myRequestId = null;

        function login() {
            const id = document.getElementById('stuID').value.trim();
            const name = document.getElementById('stuName').value.trim();
            if(!id || !name) return alert("Fill details");
            currentUser = { id, name };
            localStorage.setItem('sego_user', JSON.stringify(currentUser));
            location.reload();
        }
        function logout() { localStorage.clear(); location.reload(); }

        if(currentUser) {
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('displayStuName').innerText = currentUser.name;
            checkActiveRequests();
        }

        function setPax(num, btn) {
            selectedPax = num;
            document.querySelectorAll('.pax-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function switchTab(t) {
            document.getElementById('instantSection').style.display = t === 'instant' ? 'block' : 'none';
            document.getElementById('bookingSection').style.display = t === 'booking' ? 'block' : 'none';
            document.getElementById('tabInstant').className = t === 'instant' ? 'tab active' : 'tab';
            document.getElementById('tabBooking').className = t === 'booking' ? 'tab active' : 'tab';
        }

        // --- NEW OPEN REQUEST LOGIC ---
        async function findDriver() {
            const pickup = document.getElementById('pickupLoc').value.trim();
            const drop = document.getElementById('dropLoc').value.trim();
            if(!pickup || !drop) return alert("Enter pickup and destination");

            const newReq = db.ref('open_requests').push();
            myRequestId = newReq.key;
            
            await newReq.set({
                student_id: currentUser.id,
                student_name: currentUser.name,
                pickup: pickup,
                destination: drop,
                pax: selectedPax,
                status: 'SEARCHING',
                timestamp: Date.now()
            });

            localStorage.setItem('active_request_id', myRequestId);
            updateUIState('SEARCHING');
        }

        function checkActiveRequests() {
            const reqId = localStorage.getItem('active_request_id');
            if(!reqId) return;

            db.ref('open_requests/' + reqId).on('value', snap => {
                const data = snap.val();
                if(!data) {
                    updateUIState('IDLE');
                    return;
                }

                if(data.status === 'ACCEPTED') {
                    updateUIState('ACCEPTED', data);
                } else {
                    updateUIState('SEARCHING');
                }
            });
        }

        function updateUIState(state, data = null) {
            const form = document.getElementById('requestForm');
            const search = document.getElementById('searchingState');
            const active = document.getElementById('tripActiveState');

            form.style.display = 'none';
            search.style.display = 'none';
            active.style.display = 'none';

            if(state === 'IDLE') form.style.display = 'block';
            if(state === 'SEARCHING') search.style.display = 'block';
            if(state === 'ACCEPTED') {
                active.style.display = 'block';
                active.innerHTML = `
                    <div class="card" style="border-left:5px solid var(--blue)">
                        <h3>Driver Found!</h3>
                        <p><b>${data.driver_name}</b> is coming to pick you up.</p>
                        <p style="color:var(--slate)">${data.driver_car} • ${data.driver_plate}</p>
                        <div style="display:flex; gap:10px; margin-top:15px;">
                            <button class="btn" onclick="openChatBox('${data.driver_id}', '${data.driver_name}')">CHAT</button>
                            <button class="btn" style="background:var(--red)" onclick="cancelRequest()">CANCEL</button>
                        </div>
                    </div>`;
            }
        }

        async function cancelRequest() {
            const reqId = localStorage.getItem('active_request_id');
            if(reqId && confirm("Cancel this request?")) {
                await db.ref('open_requests/' + reqId).remove();
                localStorage.removeItem('active_request_id');
                location.reload();
            }
        }

        // --- Chat & Rating Sama Macam Sebelum Ni ---
        function openChatBox(id, name) {
            document.getElementById('chatWith').innerText = name;
            document.getElementById('chatPanel').style.display = 'flex';
            // Chat logic...
        }
        function closeChat() { document.getElementById('chatPanel').style.display = 'none'; }
    </script>
</body>
</html>
