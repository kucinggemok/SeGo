<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeGo | Student Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --blue: #3b82f6; --amber: #fbbc04; --red: #ef4444; --green: #22c55e; --white: #ffffff; --slate: #94a3b8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #334155; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .input-field { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        label { font-size: 0.8rem; color: var(--slate); margin-top: 5px; display: block; }
        .btn { width: 100%; padding: 14px; background: var(--blue); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        .tab-bar { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; }
        .tab-btn { flex: 1; padding: 10px; background: #1e293b; color: white; border: 1px solid #334155; border-radius: 10px; cursor: pointer; }
        .tab-btn.active { background: var(--blue); border-color: var(--blue); font-weight: bold; }
        
        .pax-btn { width: 45px; height: 45px; border-radius: 50%; border: 1px solid var(--blue); background: none; color: white; cursor: pointer; }
        .pax-btn.active { background: var(--blue); font-weight: bold; }

        #infoModal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10001; align-items:center; justify-content:center; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); width: 85%; max-width: 350px; padding: 25px; border-radius: 20px; border: 1px solid #475569; text-align: center; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 5px; }
        .plate-box { background: var(--amber); color: black; padding: 5px 15px; border-radius: 5px; font-weight: 900; font-family: monospace; font-size: 1.2rem; }

        .booking-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid var(--amber); }
        .status-accepted { border-left-color: var(--green) !important; }

        #chatPanel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: none; flex-direction: column; }
        #chatMessages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 10px 15px; border-radius: 15px; max-width: 75%; font-size: 0.9rem; color: white; }
        .bubble.me { align-self: flex-end; background: var(--blue); }
        .bubble.them { align-self: flex-start; background: #334155; }
        #ratingModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; display: none; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="container">
        <div id="loginArea">
            <h1 style="text-align: center;">🚗 SeGo</h1>
            <div class="card">
                <input type="text" id="stuID" class="input-field" placeholder="Student ID">
                <input type="text" id="stuName" class="input-field" placeholder="Full Name">
                <button class="btn" onclick="login()">Login</button>
            </div>
        </div>

        <div id="mainApp" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <span>Hi, <b id="displayStuName"></b></span>
                <button onclick="logout()" style="background:none; border:none; color:var(--red); cursor:pointer;">Logout</button>
            </div>

            <div class="tab-bar">
                <button class="tab-btn active" id="btnInstant" onclick="showTab('instant')">Instant</button>
                <button class="tab-btn" id="btnBooking" onclick="showTab('booking')">Pre-Booking</button>
            </div>

            <div id="sectionInstant">
                <div id="requestForm" class="card">
                    <h4>Instant Request</h4>
                    <label>From:</label>
                    <select id="insPick" class="input-field" onchange="toggleOther('insPick')">
                        <option value="UiTM">UiTM</option><option value="US Sentral">US Sentral</option><option value="OS Sentral">OS Sentral</option><option value="KTM/Stesen Bas">KTM/Stesen Bas</option><option value="Others">Others</option>
                    </select>
                    <input type="text" id="insPickOther" class="input-field" style="display:none;" placeholder="Where exactly?">

                    <label>To:</label>
                    <select id="insDest" class="input-field" onchange="toggleOther('insDest')">
                        <option value="US Sentral">US Sentral</option><option value="UiTM">UiTM</option><option value="OS Sentral">OS Sentral</option><option value="KTM/Stesen Bas">KTM/Stesen Bas</option><option value="Others">Others</option>
                    </select>
                    <input type="text" id="insDestOther" class="input-field" style="display:none;" placeholder="Destination name?">

                    <label>Number of Pax:</label>
                    <div style="display: flex; justify-content: space-around; margin: 15px 0;">
                        <button class="pax-btn active" id="pax1" onclick="setPax(1)">1</button>
                        <button class="pax-btn" id="pax2" onclick="setPax(2)">2</button>
                        <button class="pax-btn" id="pax3" onclick="setPax(3)">3</button>
                        <button class="pax-btn" id="pax4" onclick="setPax(4)">4</button>
                    </div>
                    <button class="btn" onclick="findDriver()">FIND DRIVER</button>
                </div>

                <div id="searchingState" class="card" style="display: none; text-align: center;">
                    <p>Searching for nearby drivers...</p>
                    <button class="btn" style="background:var(--red);" onclick="cancelRequest()">CANCEL</button>
                </div>
                <div id="activeTripState" style="display: none;"></div>
            </div>

            <div id="sectionBooking" style="display: none;">
                <div class="card">
                    <h4>Pre-Booking</h4>
                    <label>Date & Time:</label>
                    <div style="display: flex; gap: 5px;">
                        <input type="date" id="bookDate" class="input-field">
                        <input type="time" id="bookTime" class="input-field">
                    </div>
                    
                    <label>From:</label>
                    <select id="bookPick" class="input-field" onchange="toggleOther('bookPick')">
                        <option value="UiTM">UiTM</option><option value="US Sentral">US Sentral</option><option value="OS Sentral">OS Sentral</option><option value="KTM/Stesen Bas">KTM/Stesen Bas</option><option value="Others">Others</option>
                    </select>
                    <input type="text" id="bookPickOther" class="input-field" style="display:none;" placeholder="Specify pickup">

                    <label>To:</label>
                    <select id="bookDest" class="input-field" onchange="toggleOther('bookDest')">
                        <option value="US Sentral">US Sentral</option><option value="UiTM">UiTM</option><option value="OS Sentral">OS Sentral</option><option value="KTM/Stesen Bas">KTM/Stesen Bas</option><option value="Others">Others</option>
                    </select>
                    <input type="text" id="bookDestOther" class="input-field" style="display:none;" placeholder="Specify destination">

                    <button class="btn" style="background:var(--green);" onclick="submitBooking()">POST BOOKING</button>
                </div>
                <div id="myBookingsList"></div>
            </div>
        </div>
    </div>

    <div id="infoModal">
        <div class="modal-content">
            <h3 style="color:var(--amber);">Driver Information</h3>
            <div class="info-row"><span>Name</span><b id="mdName"></b></div>
            <div class="info-row"><span>Driver ID</span><b id="mdID"></b></div>
            <div class="info-row"><span>Car</span><b id="mdCar"></b></div>
            <div style="margin: 20px 0;"><span style="font-size:0.8rem; color:var(--slate);">PLATE NO</span><br><div class="plate-box" id="mdPlate"></div></div>
            <button class="btn" onclick="document.getElementById('infoModal').style.display='none'">CLOSE</button>
        </div>
    </div>

    <div id="chatPanel">
        <div style="background: var(--blue); padding: 20px; display: flex; align-items: center; color: white;">
            <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:1.5rem;">←</button>
            <b style="margin-left:15px;" id="chatWith">Driver</b>
        </div>
        <div id="chatMessages"></div>
        <div style="padding:15px; display:flex; gap:10px; background:var(--card);">
            <input type="text" id="chatInput" class="input-field" style="margin:0" placeholder="Type..."><button class="btn" style="width:80px; margin:0;" onclick="sendChatMsg()">Send</button>
        </div>
    </div>

    <div id="ratingModal">
        <div class="card" style="text-align: center; width: 85%;">
            <h2>Trip Completed!</h2>
            <select id="rateValue" class="input-field"><option value="5">⭐⭐⭐⭐⭐</option><option value="4">⭐⭐⭐⭐</option></select>
            <input type="text" id="rateFeedback" class="input-field" placeholder="Feedback..."><button class="btn" onclick="submitRating()">Submit</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCU3QzjiDpL4U3825XtERth6PFlJ1tsZtg", databaseURL: "https://carpool-uitm-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "carpool-uitm" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = JSON.parse(localStorage.getItem('sego_user'));
        let activeReqId = localStorage.getItem('active_request_id');
        let selectedPax = 1;
        let currentChatId = null;

        if(currentUser) {
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('displayStuName').innerText = currentUser.name;
            listenToRequest();
            loadMyBookings();
        }

        function setPax(n) {
            selectedPax = n;
            document.querySelectorAll('.pax-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('pax'+n).classList.add('active');
        }

        function login() {
            const id = document.getElementById('stuID').value;
            const name = document.getElementById('stuName').value;
            if(id && name) { localStorage.setItem('sego_user', JSON.stringify({id, name})); location.reload(); }
        }
        function logout() { localStorage.clear(); location.reload(); }
        function showTab(t) {
            document.getElementById('sectionInstant').style.display = t === 'instant' ? 'block' : 'none';
            document.getElementById('sectionBooking').style.display = t === 'booking' ? 'block' : 'none';
            document.getElementById('btnInstant').classList.toggle('active', t === 'instant');
            document.getElementById('btnBooking').classList.toggle('active', t === 'booking');
        }

        function toggleOther(id) {
            const val = document.getElementById(id).value;
            document.getElementById(id + 'Other').style.display = (val === 'Others') ? 'block' : 'none';
        }
        function getVal(id) {
            const main = document.getElementById(id).value;
            return (main === 'Others') ? document.getElementById(id + 'Other').value : main;
        }

        async function findDriver() {
            const p = getVal('insPick'); const d = getVal('insDest');
            if(!p || !d) return alert("Select locations");
            const newReq = db.ref('open_requests').push();
            activeReqId = newReq.key;
            localStorage.setItem('active_request_id', activeReqId);
            await newReq.set({ student_id: currentUser.id, student_name: currentUser.name, pickup: p, destination: d, pax: selectedPax, status: 'SEARCHING' });
            listenToRequest();
        }

        function listenToRequest() {
            if(!activeReqId) return;
            db.ref('open_requests/' + activeReqId).on('value', snap => {
                const data = snap.val();
                if(!data) { updateUI('IDLE'); return; }
                if(data.status === 'ACCEPTED') updateUI('ACCEPTED', data);
                else if(data.status === 'COMPLETED') {
                    localStorage.setItem('pending_rating_id', data.driver_id);
                    document.getElementById('ratingModal').style.display = 'flex';
                } else updateUI('SEARCHING');
            });
        }

        function updateUI(s, data = null) {
            document.getElementById('requestForm').style.display = s === 'IDLE' ? 'block' : 'none';
            document.getElementById('searchingState').style.display = s === 'SEARCHING' ? 'block' : 'none';
            const area = document.getElementById('activeTripState');
            area.style.display = s === 'ACCEPTED' ? 'block' : 'none';
            if(s === 'ACCEPTED' && data) {
                area.innerHTML = `<div class="card" style="border-left:5px solid var(--green)">
                    <h4>Driver Found!</h4><p><b>${data.driver_name}</b> is coming.</p>
                    <button class="btn" style="background:#475569" onclick="openInfo('${data.driver_name}','${data.driver_id}','${data.driver_car}','${data.driver_plate||'N/A'}')">DRIVER INFO</button>
                    <button class="btn" onclick="openChatBox('${activeReqId}','${data.driver_name}')">💬 CHAT DRIVER</button>
                    <button class="btn" style="background:var(--amber); color:black" onclick="finishTripManual()">✅ FINISH TRIP</button>
                </div>`;
            }
        }

        function openInfo(name, id, car, plate) {
            document.getElementById('mdName').innerText = name;
            document.getElementById('mdID').innerText = id;
            document.getElementById('mdCar').innerText = car;
            document.getElementById('mdPlate').innerText = plate;
            document.getElementById('infoModal').style.display = 'flex';
        }

        async function submitRating() {
            const drvId = localStorage.getItem('pending_rating_id');
            if(drvId) {
                await db.ref('drivers/' + drvId + '/feedbacks').push({ rating: document.getElementById('rateValue').value, comment: document.getElementById('rateFeedback').value, student: currentUser.name, date: new Date().toLocaleDateString() });
            }
            if(activeReqId) {
                await db.ref('open_requests/' + activeReqId).remove();
                await db.ref('chats/' + activeReqId).remove();
            }
            localStorage.removeItem('active_request_id');
            location.reload();
        }

        function openChatBox(id, name) {
            currentChatId = id; document.getElementById('chatWith').innerText = name;
            document.getElementById('chatPanel').style.display = 'flex';
            db.ref('chats/' + id).on('value', snap => {
                let h = ""; snap.forEach(m => { const msg = m.val(); h += `<div class="bubble ${msg.sender==='student'?'me':'them'}">${msg.text}</div>`; });
                const b = document.getElementById('chatMessages'); b.innerHTML = h; b.scrollTop = b.scrollHeight;
            });
        }
        function closeChat() { document.getElementById('chatPanel').style.display = 'none'; }
        async function sendChatMsg() {
            const i = document.getElementById('chatInput'); if(!i.value.trim()) return;
            await db.ref('chats/' + currentChatId).push({ sender: 'student', text: i.value }); i.value = "";
        }
        async function cancelRequest() { if(confirm("Cancel this request?")) { await db.ref('open_requests/' + activeReqId).remove(); localStorage.removeItem('active_request_id'); location.reload(); } }
        async function cancelBooking(bid) { if(confirm("Cancel this booking?")) { await db.ref('bookings/' + bid).remove(); } }
        
        async function finishTripManual() {
            const snap = await db.ref('open_requests/' + activeReqId).get();
            if(snap.exists()) { localStorage.setItem('pending_rating_id', snap.val().driver_id); await db.ref('open_requests/' + activeReqId).update({ status: 'COMPLETED' }); }
        }

        async function submitBooking() {
            const d = document.getElementById('bookDate').value; const t = document.getElementById('bookTime').value;
            const p = getVal('bookPick'); const ds = getVal('bookDest');
            if(!d || !t || !p || !ds) return alert("Please fill all details");
            await db.ref('bookings').push({ student_id: currentUser.id, student_name: currentUser.name, date: d, time: t, pickup: p, dest: ds, status: 'PENDING' });
            alert("Booking Posted to Board!");
        }

        function loadMyBookings() {
            db.ref('bookings').on('value', snap => {
                let h = ""; snap.forEach(c => { 
                    const b = c.val(); 
                    if(b.student_id === currentUser.id) {
                        const isAcc = b.status === 'ACCEPTED';
                        h += `<div class="booking-item ${isAcc ? 'status-accepted' : ''}">
                            <b>${b.pickup} ➔ ${b.dest}</b><br>
                            <small>${b.date} | ${b.time} | <b>${b.status}</b></small><br>
                            ${isAcc ? `<button class="btn" style="padding:8px; font-size:0.8rem;" onclick="openChatBox('${c.key}', '${b.driver_name}')">💬 CHAT DRIVER</button>` : 
                            `<button class="btn" style="background:var(--red); padding:8px; font-size:0.8rem;" onclick="cancelBooking('${c.key}')">❌ CANCEL</button>`}
                        </div>`;
                    }
                });
                document.getElementById('myBookingsList').innerHTML = h || "<p style='text-align:center; color:gray;'>No bookings yet.</p>";
            });
        }
    </script>
</body>
</html>
