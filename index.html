<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeGo | Student Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0f172a; 
            --card: #1e293b; 
            --blue: #2563eb; 
            --amber: #f59e0b; 
            --red: #dc2626; 
            --green: #16a34a; 
            --white: #f8fafc; 
            --slate: #94a3b8; 
            --border: #334155;
        }
        
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--white); 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            -webkit-font-smoothing: antialiased;
        }

        .container { width: 100%; max-width: 420px; }
        
        .card { 
            background: var(--card); 
            padding: 24px; 
            border-radius: 16px; 
            margin-bottom: 16px; 
            border: 1px solid var(--border); 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); 
        }

        h1, h2, h3, h4 { font-weight: 700; letter-spacing: -0.025em; margin-top: 0; }
        
        .input-field { 
            width: 100%; 
            padding: 12px 16px; 
            margin: 10px 0; 
            border-radius: 8px; 
            border: 1px solid var(--border); 
            background: #0f172a; 
            color: white; 
            box-sizing: border-box; 
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        .input-field:focus { outline: none; border-color: var(--blue); }
        
        #regName { text-transform: uppercase; }
        #regName::placeholder { text-transform: none; }

        label { font-size: 0.75rem; font-weight: 600; color: var(--slate); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 12px; display: block; }
        
        .btn { 
            width: 100%; 
            padding: 14px; 
            background: var(--blue); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 0.95rem;
            margin-top: 12px; 
            transition: all 0.2s; 
        }

        .btn:hover { filter: brightness(1.1); }
        .btn:active { transform: scale(0.98); }

        .btn-outline { 
            background: transparent; 
            border: 1px solid var(--border); 
            color: var(--slate); 
            margin-top: 20px;
            font-size: 0.85rem;
        }

        .tab-bar { display: flex; gap: 8px; margin-bottom: 20px; background: #1e293b; padding: 4px; border-radius: 10px; border: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 10px; background: transparent; color: var(--slate); border: none; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
        .tab-btn.active { background: var(--blue); color: white; }
        
        .pax-btn { width: 48px; height: 40px; border-radius: 8px; border: 1px solid var(--border); background: #0f172a; color: white; cursor: pointer; font-weight: 600; }
        .pax-btn.active { border-color: var(--blue); background: rgba(37, 99, 235, 0.1); color: var(--blue); }

        /* Modal & UI Elements */
        #infoModal, #ratingModal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:10001; align-items:center; justify-content:center; backdrop-filter: blur(4px); }
        .modal-content { background: var(--card); width: 85%; max-width: 360px; padding: 28px; border-radius: 20px; border: 1px solid var(--border); }
        
        .info-row { display: flex; justify-content: space-between; margin-bottom: 12px; border-bottom: 1px solid #334155; padding-bottom: 8px; font-size: 0.9rem; }
        .plate-box { background: #000; color: #fff; padding: 8px 16px; border-radius: 4px; font-weight: 700; font-family: 'Monaco', monospace; font-size: 1.1rem; border: 2px solid #334155; display: inline-block; }

        .booking-item { background: rgba(255,255,255,0.03); padding: 16px; border-radius: 12px; margin-bottom: 12px; border: 1px solid var(--border); }
        .status-accepted { border-left: 4px solid var(--green); }

        #chatPanel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: none; flex-direction: column; }
    </style>
</head>
<body>

    <div class="container">
        <div id="loginArea">
            <h2 style="text-align: center; margin-bottom: 30px;">SEGO</h2>
            <div class="card">
                <label>Access Portal</label>
                <input type="text" id="stuID" class="input-field" placeholder="Student ID (e.g. 2023xxxxxx)">
                <button class="btn" onclick="login()">Sign In</button>
                <p style="text-align:center; font-size:0.85rem; margin-top:20px; color:var(--slate);">
                    No account? <span style="color:var(--blue); cursor:pointer; font-weight:600;" onclick="toggleAuth()">Register</span>
                </p>
            </div>
            <button class="btn btn-outline" onclick="window.location.href='review.html'">
                Submit Driver Feedback / Review
            </button>
        </div>

        <div id="registerArea" style="display: none;">
            <h2 style="text-align: center; margin-bottom: 30px;">Create Account</h2>
            <div class="card">
                <label>Student ID</label>
                <input type="text" id="regID" class="input-field" placeholder="10-digit Matrix Number">
                <label>Full Name</label>
                <input type="text" id="regName" class="input-field" placeholder="AS PER STUDENT CARD">
                <label>Phone Number</label>
                <input type="text" id="regPhone" class="input-field" placeholder="01x-xxxxxxx">
                <button class="btn" style="background: var(--green);" onclick="register()">Complete Registration</button>
                <p style="text-align:center; font-size:0.85rem; margin-top:20px; color:var(--slate);">
                    Have an account? <span style="color:var(--blue); cursor:pointer; font-weight:600;" onclick="toggleAuth()">Login</span>
                </p>
            </div>
        </div>

        <div id="mainApp" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <span style="font-weight: 500; font-size: 0.9rem; color: var(--slate);">User: <b id="displayStuName" style="color:white"></b></span>
                <button onclick="logout()" style="background:none; border:none; color:var(--red); cursor:pointer; font-size:0.85rem; font-weight:600;">Sign Out</button>
            </div>

            <div class="tab-bar">
                <button class="tab-btn active" id="btnInstant" onclick="showTab('instant')">Instant Trip</button>
                <button class="tab-btn" id="btnBooking" onclick="showTab('booking')">Schedule Booking</button>
            </div>

            <div id="sectionInstant">
                <div id="requestForm" class="card">
                    <h4 style="margin-bottom:15px; font-size:1.1rem;">Request Ride</h4>
                    <label>Pickup Location</label>
                    <select id="insPick" class="input-field" onchange="toggleOther('insPick')">
                        <option value="UiTM">UiTM</option><option value="US Sentral">US Sentral</option><option value="OS Sentral">OS Sentral</option><option value="KTM/Stesen Bas">KTM/Stesen Bas</option><option value="Others">Others</option>
                    </select>
                    <input type="text" id="insPickOther" class="input-field" style="display:none;" placeholder="Enter location">

                    <label>Destination</label>
                    <select id="insDest" class="input-field" onchange="toggleOther('insDest')">
                        <option value="US Sentral">US Sentral</option><option value="UiTM">UiTM</option><option value="OS Sentral">OS Sentral</option><option value="KTM/Stesen Bas">KTM/Stesen Bas</option><option value="Others">Others</option>
                    </select>
                    <input type="text" id="insDestOther" class="input-field" style="display:none;" placeholder="Enter destination">

                    <label>Passengers (Pax)</label>
                    <div style="display: flex; gap: 10px; margin: 12px 0;">
                        <button class="pax-btn active" id="pax1" onclick="setPax(1)">1</button>
                        <button class="pax-btn" id="pax2" onclick="setPax(2)">2</button>
                        <button class="pax-btn" id="pax3" onclick="setPax(3)">3</button>
                        <button class="pax-btn" id="pax4" onclick="setPax(4)">4</button>
                    </div>
                    <button class="btn" onclick="findDriver()">SEARCH FOR DRIVER</button>
                </div>

                <div id="searchingState" class="card" style="display: none; text-align: center; padding: 40px 20px;">
                    <div style="margin-bottom: 20px; color: var(--blue);">Connecting with nearby drivers...</div>
                    <button class="btn" style="background:#334155;" onclick="cancelRequest()">CANCEL REQUEST</button>
                </div>
                <div id="activeTripState" style="display: none;"></div>
            </div>

            <div id="sectionBooking" style="display: none;">
                <div class="card">
                    <h4>Pre-Booking</h4>
                    <label>Schedule Date & Time</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="date" id="bookDate" class="input-field">
                        <input type="time" id="bookTime" class="input-field">
                    </div>
                    <label>Pickup</label>
                    <select id="bookPick" class="input-field" onchange="toggleOther('bookPick')">
                        <option value="UiTM">UiTM</option><option value="US Sentral">US Sentral</option><option value="Others">Others</option>
                    </select>
                    <input type="text" id="bookPickOther" class="input-field" style="display:none;">
                    <label>Destination</label>
                    <select id="bookDest" class="input-field" onchange="toggleOther('bookDest')">
                        <option value="US Sentral">US Sentral</option><option value="UiTM">UiTM</option><option value="Others">Others</option>
                    </select>
                    <input type="text" id="bookDestOther" class="input-field" style="display:none;">
                    <button class="btn" style="background:var(--green);" onclick="submitBooking()">CONFIRM BOOKING</button>
                </div>
                <div id="myBookingsList"></div>
            </div>
        </div>
    </div>

    <div id="infoModal">
        <div class="modal-content">
            <h3 style="margin-bottom:20px;">Driver Details</h3>
            <div class="info-row"><span>Name</span><b id="mdName"></b></div>
            <div class="info-row"><span>Driver ID</span><b id="mdID"></b></div>
            <div class="info-row"><span>Vehicle</span><b id="mdCar"></b></div>
            <div style="margin: 20px 0; text-align:center;">
                <span style="font-size:0.7rem; color:var(--slate); text-transform:uppercase;">Plate Number</span><br>
                <div class="plate-box" id="mdPlate"></div>
            </div>
            <button class="btn" onclick="document.getElementById('infoModal').style.display='none'">DISMISS</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCU3QzjiDpL4U3825XtERth6PFlJ1tsZtg", databaseURL: "https://carpool-uitm-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "carpool-uitm" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = JSON.parse(localStorage.getItem('sego_user'));
        let activeReqId = localStorage.getItem('active_request_id');
        let selectedPax = 1;
        let currentChatId = null;

        if(currentUser) {
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('displayStuName').innerText = currentUser.name;
            listenToRequest();
            loadMyBookings();
        }

        function toggleAuth() {
            const login = document.getElementById('loginArea');
            const register = document.getElementById('registerArea');
            if(login.style.display === 'none') { login.style.display = 'block'; register.style.display = 'none'; }
            else { login.style.display = 'none'; register.style.display = 'block'; }
        }

        async function register() {
            const id = document.getElementById('regID').value.trim();
            const name = document.getElementById('regName').value.trim().toUpperCase();
            const phone = document.getElementById('regPhone').value.trim();
            if(id.length < 5 || name.length < 3) return alert("Fill all details!");
            const check = await db.ref('students/' + id).get();
            if(check.exists()) return alert("ID already exists!");
            await db.ref('students/' + id).set({ name: name, phone: phone });
            alert("Registered. Please login.");
            toggleAuth();
        }

        async function login() {
            const id = document.getElementById('stuID').value.trim();
            if(!id) return alert("Enter ID");
            const snap = await db.ref('students/' + id).get();
            if(snap.exists()) {
                localStorage.setItem('sego_user', JSON.stringify({id: id, name: snap.val().name}));
                location.reload();
            } else alert("ID not found.");
        }

        function setPax(n) { selectedPax = n; document.querySelectorAll('.pax-btn').forEach(b => b.classList.remove('active')); document.getElementById('pax'+n).classList.add('active'); }
        function logout() { localStorage.clear(); location.reload(); }
        function showTab(t) { document.getElementById('sectionInstant').style.display = t === 'instant' ? 'block' : 'none'; document.getElementById('sectionBooking').style.display = t === 'booking' ? 'block' : 'none'; document.getElementById('btnInstant').classList.toggle('active', t === 'instant'); document.getElementById('btnBooking').classList.toggle('active', t === 'booking'); }
        function toggleOther(id) { const val = document.getElementById(id).value; document.getElementById(id + 'Other').style.display = (val === 'Others') ? 'block' : 'none'; }
        function getVal(id) { const main = document.getElementById(id).value; return (main === 'Others') ? document.getElementById(id + 'Other').value : main; }

        async function findDriver() {
            const p = getVal('insPick'); const d = getVal('insDest');
            if(!p || !d) return alert("Select locations");
            const newReq = db.ref('open_requests').push();
            activeReqId = newReq.key;
            localStorage.setItem('active_request_id', activeReqId);
            await newReq.set({ student_id: currentUser.id, student_name: currentUser.name, pickup: p, destination: d, pax: selectedPax, status: 'SEARCHING' });
            listenToRequest();
        }

        function listenToRequest() {
            if(!activeReqId) return;
            db.ref('open_requests/' + activeReqId).on('value', snap => {
                const data = snap.val();
                if(!data) { updateUI('IDLE'); return; }
                if(data.status === 'ACCEPTED') updateUI('ACCEPTED', data);
                else if(data.status === 'COMPLETED') {
                    localStorage.setItem('pending_rating_id', data.driver_id);
                    window.location.href = 'review.html';
                } else updateUI('SEARCHING');
            });
        }

        function updateUI(s, data = null) {
            document.getElementById('requestForm').style.display = s === 'IDLE' ? 'block' : 'none';
            document.getElementById('searchingState').style.display = s === 'SEARCHING' ? 'block' : 'none';
            const area = document.getElementById('activeTripState');
            area.style.display = s === 'ACCEPTED' ? 'block' : 'none';
            if(s === 'ACCEPTED' && data) {
                area.innerHTML = `<div class="card" style="border-left:4px solid var(--green)">
                    <h4 style="margin-bottom:5px;">Driver Assigned</h4>
                    <p style="color:var(--slate); font-size:0.9rem; margin-bottom:15px;"><b>${data.driver_name}</b> is on the way.</p>
                    <button class="btn" style="background:#475569; margin-top:0;" onclick="openInfo('${data.driver_name}','${data.driver_id}','${data.driver_car}','${data.driver_plate||'N/A'}')">VEHICLE INFO</button>
                    <button class="btn" onclick="finishTripManual()" style="background:var(--amber); color:black">COMPLETE TRIP</button>
                </div>`;
            }
        }

        function openInfo(name, id, car, plate) {
            document.getElementById('mdName').innerText = name; document.getElementById('mdID').innerText = id;
            document.getElementById('mdCar').innerText = car; document.getElementById('mdPlate').innerText = plate;
            document.getElementById('infoModal').style.display = 'flex';
        }

        async function cancelRequest() { if(confirm("Cancel request?")) { await db.ref('open_requests/' + activeReqId).remove(); localStorage.removeItem('active_request_id'); location.reload(); } }
        async function finishTripManual() {
            const snap = await db.ref('open_requests/' + activeReqId).get();
            if(snap.exists()) { localStorage.setItem('pending_rating_id', snap.val().driver_id); await db.ref('open_requests/' + activeReqId).update({ status: 'COMPLETED' }); }
        }

        async function submitBooking() {
            const d = document.getElementById('bookDate').value; const t = document.getElementById('bookTime').value;
            const p = getVal('bookPick'); const ds = getVal('bookDest');
            if(!d || !t || !p || !ds) return alert("Fill all details");
            await db.ref('bookings').push({ student_id: currentUser.id, student_name: currentUser.name, date: d, time: t, pickup: p, dest: ds, status: 'PENDING' });
            alert("Booking Posted!");
        }

        function loadMyBookings() {
            db.ref('bookings').on('value', snap => {
                let h = ""; snap.forEach(c => { 
                    const b = c.val(); 
                    if(b.student_id === currentUser.id) {
                        const isAcc = b.status === 'ACCEPTED';
                        h += `<div class="booking-item ${isAcc ? 'status-accepted' : ''}">
                            <b>${b.pickup} ➔ ${b.dest}</b><br>
                            <small style="color:var(--slate)">${b.date} | ${b.time} | <b>${b.status}</b></small>
                        </div>`;
                    }
                });
                document.getElementById('myBookingsList').innerHTML = h || "<p style='text-align:center; color:gray; font-size:0.8rem;'>No active bookings.</p>";
            });
        }
    </script>
</body>
</html>
