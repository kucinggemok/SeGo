<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeGo | Student Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0f172a; 
            --card: #1e293b; 
            --blue: #2563eb; 
            --blue-hover: #1d4ed8;
            --amber: #fbbf24; 
            --red: #f43f5e; 
            --green: #10b981; 
            --white: #f8fafc; 
            --slate: #94a3b8; 
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--white); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .container { width: 100%; max-width: 420px; }
        .card { 
            background: var(--card); padding: 24px; border-radius: 20px; margin-bottom: 20px; 
            border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
        }

        .input-field { 
            width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #334155; 
            background: #0f172a; color: white; box-sizing: border-box; font-size: 0.95rem;
        }

        label { font-size: 0.75rem; color: var(--slate); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }

        .btn { 
            width: 100%; padding: 16px; background: var(--blue); color: white; border: none; border-radius: 14px; 
            cursor: pointer; font-weight: 600; font-size: 1rem; margin-top: 12px; transition: all 0.2s ease;
        }
        .btn:hover { background: var(--blue-hover); transform: translateY(-1px); }

        .tab-bar { display: flex; gap: 12px; margin-bottom: 24px; background: rgba(0,0,0,0.2); padding: 6px; border-radius: 16px; }
        .tab-btn { flex: 1; padding: 12px; background: transparent; color: var(--slate); border: none; border-radius: 12px; cursor: pointer; font-weight: 600; }
        .tab-btn.active { background: var(--card); color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }

        .pax-container { display: flex; justify-content: space-between; margin: 15px 0; background: #0f172a; padding: 5px; border-radius: 14px; }
        .pax-btn { flex: 1; height: 45px; border: none; background: none; color: var(--slate); cursor: pointer; border-radius: 10px; font-weight: 700; }
        .pax-btn.active { background: var(--blue); color: white; }

        /* Notification Banner Style */
        .notif-banner {
            background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 15px; border-radius: 15px; margin-bottom: 20px; display: flex; 
            align-items: center; justify-content: space-between; animation: slideDown 0.4s ease;
        }
        @keyframes slideDown { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .plate-box { background: #111; color: #eee; padding: 10px 20px; border-radius: 8px; font-weight: 800; font-family: monospace; font-size: 1.4rem; border: 2px solid #333; display: inline-block; }

        #driverRegOverlay, #chatPanel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 20000; display: none; flex-direction: column; padding: 20px; box-sizing: border-box; }
        #infoModal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(15, 23, 42, 0.9); z-index: 10001; align-items:center; justify-content:center; backdrop-filter: blur(8px); }
        .modal-content { background: var(--card); width: 85%; max-width: 360px; padding: 30px; border-radius: 24px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .bubble { padding: 12px 16px; border-radius: 18px; max-width: 80%; font-size: 0.9rem; margin: 4px 0; }
        .bubble.me { align-self: flex-end; background: var(--blue); border-bottom-right-radius: 4px; }
        .bubble.them { align-self: flex-start; background: #334155; border-bottom-left-radius: 4px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="loginArea">
            <h1 style="text-align: center; font-size: 2.5rem; margin-bottom: 10px;">SeGo</h1>
            <p style="text-align: center; color: var(--slate); margin-bottom: 30px;">UiTM Student Carpool Portal</p>
            <div class="card">
                <label>Student ID</label>
                <input type="text" id="stuID" class="input-field" placeholder="Enter ID">
                <button class="btn" onclick="login()">Login</button>
                <p style="text-align:center; font-size:0.85rem; cursor:pointer; color:var(--blue); margin-top:20px;" onclick="toggleAuth()">New user? Create an account</p>
            </div>
            <p style="text-align:center; margin-top:30px; font-size:0.85rem; color:var(--slate);">Partner with us. <span onclick="openDriverReg()" style="color:var(--amber); cursor:pointer; font-weight:600;">Register as Driver</span></p>
        </div>

        <div id="registerArea" style="display: none;">
            <h2 style="text-align: center;">Join SeGo</h2>
            <div class="card">
                <label>Student ID</label><input type="text" id="regID" class="input-field" placeholder="Matrix ID">
                <label>Full Name</label><input type="text" id="regName" class="input-field" placeholder="Official Name">
                <label>Phone</label><input type="text" id="regPhone" class="input-field" placeholder="01x-xxxxxxx">
                <button class="btn" style="background: var(--green);" onclick="register()">Create Account</button>
                <p style="text-align:center; font-size:0.85rem; cursor:pointer; color:var(--blue); margin-top:20px;" onclick="toggleAuth()">Back to Login</p>
            </div>
        </div>

        <div id="mainApp" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <span style="color: var(--slate);">Hi, <b id="displayStuName" style="color:white"></b></span>
                <button onclick="logout()" style="background:none; border:none; color:var(--red); font-weight: 600; cursor:pointer;">Logout</button>
            </div>

            <div id="reviewBanner" class="notif-banner" style="display: none;">
                <div>
                    <div style="font-size: 0.85rem; font-weight: 600;">Trip Completed!</div>
                    <div style="font-size: 0.7rem; color: var(--slate);">Rate your experience</div>
                </div>
                <div style="display: flex; gap: 8px;">
                    <a id="reviewLink" href="https://your-review-website.com" target="_blank" style="text-decoration: none;">
                        <button class="btn" style="margin:0; padding: 8px 12px; font-size: 0.7rem; width: auto; background: var(--blue);">RATE DRIVER</button>
                    </a>
                    <button onclick="dismissReview()" style="background: none; border: none; color: var(--slate); font-size: 0.7rem; cursor: pointer;">Dismiss</button>
                </div>
            </div>

            <div class="tab-bar">
                <button class="tab-btn active" id="btnInstant" onclick="showTab('instant')">Instant</button>
                <button class="tab-btn" id="btnBooking" onclick="showTab('booking')">Pre-Booking</button>
            </div>

            <div id="sectionInstant">
                <div id="requestForm" class="card">
                    <h3 style="margin-top:0">Request Ride</h3>
                    <label>Pickup</label>
                    <select id="insPick" class="input-field" onchange="toggleOther('insPick')">
                        <option value="UiTM">UiTM Main Gate</option><option value="US Sentral">US Sentral</option><option value="Others">Others</option>
                    </select>
                    <input type="text" id="insPickOther" class="input-field" style="display:none;" placeholder="Where?">
                    
                    <label>Destination</label>
                    <select id="insDest" class="input-field" onchange="toggleOther('insDest')">
                        <option value="US Sentral">US Sentral</option><option value="UiTM">UiTM Main Gate</option><option value="Others">Others</option>
                    </select>
                    <input type="text" id="insDestOther" class="input-field" style="display:none;" placeholder="To where?">

                    <label>Passengers</label>
                    <div class="pax-container">
                        <button class="pax-btn active" id="pax1" onclick="setPax(1)">1</button>
                        <button class="pax-btn" id="pax2" onclick="setPax(2)">2</button>
                        <button class="pax-btn" id="pax3" onclick="setPax(3)">3</button>
                        <button class="pax-btn" id="pax4" onclick="setPax(4)">4</button>
                    </div>
                    <button class="btn" onclick="findDriver()">FIND DRIVER</button>
                </div>
                <div id="searchingState" class="card" style="display: none; text-align: center;">
                    <div style="margin-bottom: 20px; color: var(--slate);">Searching for drivers...</div>
                    <button class="btn" style="background:#334155;" onclick="cancelRequest()">CANCEL</button>
                </div>
                <div id="activeTripState" style="display: none;"></div>
            </div>

            <div id="sectionBooking" style="display: none;">
                <div class="card">
                    <h3 style="margin-top:0">Schedule</h3>
                    <input type="date" id="bookDate" class="input-field">
                    <input type="time" id="bookTime" class="input-field">
                    <button class="btn" style="background:var(--green);" onclick="submitBooking()">BOOK NOW</button>
                </div>
                <div id="myBookingsList"></div>
            </div>
        </div>
    </div>

    <div id="infoModal"><div class="modal-content"><h3>Driver Info</h3><div id="mdName"></div><div id="mdCar"></div><div class="plate-box" id="mdPlate"></div><button class="btn" onclick="document.getElementById('infoModal').style.display='none'">CLOSE</button></div></div>
    
    <div id="chatPanel">
        <div style="display: flex; align-items: center; margin-bottom: 20px;"><button onclick="closeChat()" style="background:none; border:none; color:white; font-size:1.5rem;">&larr;</button><b id="chatWith" style="margin-left:15px;"></b></div>
        <div id="chatMessages" style="flex: 1; overflow-y: auto; display: flex; flex-direction: column;"></div>
        <div style="display:flex; gap:10px; padding:10px 0;"><input type="text" id="chatInput" class="input-field" style="margin:0;"><button class="btn" style="width:70px; margin:0;" onclick="sendChatMsg()">Send</button></div>
    </div>

    <div id="driverRegOverlay"><div class="container"><h2>Driver Registration</h2><div class="card"><input type="text" id="dRegName" class="input-field" placeholder="Name"><input type="text" id="dRegUser" class="input-field" placeholder="Student ID"><input type="password" id="dRegPass" class="input-field" placeholder="Password"><input type="text" id="dRegCar" class="input-field" placeholder="Car Model"><input type="text" id="dRegPlate" class="input-field" placeholder="Plate No"><input type="text" id="dRegPhone" class="input-field" placeholder="WhatsApp"><button class="btn" style="background:var(--amber); color:black;" onclick="submitDriverApp()">SUBMIT</button><button class="btn" style="background:transparent; color:var(--red);" onclick="closeDriverReg()">CLOSE</button></div></div></div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCU3QzjiDpL4U3825XtERth6PFlJ1tsZtg", databaseURL: "https://carpool-uitm-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "carpool-uitm" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = JSON.parse(localStorage.getItem('sego_user'));
        let activeReqId = localStorage.getItem('active_request_id');
        let selectedPax = 1;
        let currentChatId = null;

        if(currentUser) {
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('displayStuName').innerText = currentUser.name;
            listenToRequest();
            loadMyBookings();
            if(localStorage.getItem('trip_just_finished') === 'true') document.getElementById('reviewBanner').style.display = 'flex';
        }

        function toggleAuth() { const l = document.getElementById('loginArea'); const r = document.getElementById('registerArea'); l.style.display = l.style.display==='none'?'block':'none'; r.style.display = r.style.display==='none'?'block':'none'; }
        async function login() { const id = document.getElementById('stuID').value.trim(); const snap = await db.ref('students/'+id).get(); if(snap.exists()) { localStorage.setItem('sego_user', JSON.stringify({id, name: snap.val().name})); location.reload(); } else alert("No user found"); }
        async function register() { const id = document.getElementById('regID').value; const name = document.getElementById('regName').value.toUpperCase(); await db.ref('students/'+id).set({name, phone: document.getElementById('regPhone').value}); alert("Success"); toggleAuth(); }
        
        function openDriverReg() { document.getElementById('driverRegOverlay').style.display = 'flex'; }
        function closeDriverReg() { document.getElementById('driverRegOverlay').style.display = 'none'; }
        async function submitDriverApp() { const u = document.getElementById('dRegUser').value; await db.ref('driver_pending/'+u).set({name: document.getElementById('dRegName').value, username:u, car:document.getElementById('dRegCar').value, plate:document.getElementById('dRegPlate').value}); alert("Applied!"); closeDriverReg(); }

        function showTab(t) { document.getElementById('sectionInstant').style.display = t==='instant'?'block':'none'; document.getElementById('sectionBooking').style.display = t==='booking'?'block':'none'; document.getElementById('btnInstant').classList.toggle('active', t==='instant'); document.getElementById('btnBooking').classList.toggle('active', t==='booking'); }
        function setPax(n) { selectedPax = n; document.querySelectorAll('.pax-btn').forEach(b=>b.classList.remove('active')); document.getElementById('pax'+n).classList.add('active'); }
        function toggleOther(id) { document.getElementById(id+'Other').style.display = document.getElementById(id).value==='Others'?'block':'none'; }
        function getVal(id) { const v = document.getElementById(id).value; return v==='Others'?document.getElementById(id+'Other').value : v; }

        async function findDriver() {
            activeReqId = db.ref('open_requests').push().key;
            localStorage.setItem('active_request_id', activeReqId);
            await db.ref('open_requests/'+activeReqId).set({student_id: currentUser.id, student_name: currentUser.name, pickup: getVal('insPick'), destination: getVal('insDest'), pax: selectedPax, status: 'SEARCHING'});
            listenToRequest();
        }

        function listenToRequest() {
            if(!activeReqId) return;
            db.ref('open_requests/'+activeReqId).on('value', snap => {
                const data = snap.val();
                if(!data) { updateUI('IDLE'); return; }
                if(data.status === 'ACCEPTED') updateUI('ACCEPTED', data);
                else if(data.status === 'COMPLETED') {
                    // Logic baru: Selesaikan trip dan tunjuk banner review
                    db.ref('open_requests/'+activeReqId).remove();
                    localStorage.removeItem('active_request_id');
                    localStorage.setItem('trip_just_finished', 'true');
                    location.reload();
                } else updateUI('SEARCHING');
            });
        }

        function updateUI(s, data = null) {
            document.getElementById('requestForm').style.display = s==='IDLE'?'block':'none';
            document.getElementById('searchingState').style.display = s==='SEARCHING'?'block':'none';
            const area = document.getElementById('activeTripState');
            area.style.display = s==='ACCEPTED'?'block':'none';
            if(s==='ACCEPTED' && data) {
                area.innerHTML = `<div class="card" style="border-left:5px solid var(--green)"><h4>Driver Found</h4><p><b>${data.driver_name}</b> is arriving.</p>
                <div style="display:flex; gap:10px;"><button class="btn" style="background:#334155; flex:1" onclick="openInfo('${data.driver_name}','','${data.driver_car}','${data.driver_plate}')">INFO</button>
                <button class="btn" style="flex:1" onclick="openChatBox('${activeReqId}','${data.driver_name}')">CHAT</button></div>
                <button class="btn" style="background:rgba(251, 191, 36, 0.2); color:var(--amber);" onclick="finishTripManual()">COMPLETE TRIP</button></div>`;
            }
        }

        function dismissReview() { localStorage.removeItem('trip_just_finished'); document.getElementById('reviewBanner').style.display = 'none'; }
        function openInfo(n,i,c,p) { document.getElementById('mdName').innerText = n; document.getElementById('mdCar').innerText = c; document.getElementById('mdPlate').innerText = p; document.getElementById('infoModal').style.display = 'flex'; }
        async function cancelRequest() { if(confirm("Cancel?")) { await db.ref('open_requests/'+activeReqId).remove(); localStorage.removeItem('active_request_id'); location.reload(); } }
        async function finishTripManual() { await db.ref('open_requests/'+activeReqId).update({status: 'COMPLETED'}); }
        
        function openChatBox(id, name) {
            currentChatId = id; document.getElementById('chatWith').innerText = name; document.getElementById('chatPanel').style.display = 'flex';
            db.ref('chats/'+id).on('value', snap => {
                let h = ""; snap.forEach(m => { h += `<div class="bubble ${m.val().sender==='student'?'me':'them'}">${m.val().text}</div>`; });
                const b = document.getElementById('chatMessages'); b.innerHTML = h; b.scrollTop = b.scrollHeight;
            });
        }
        function closeChat() { document.getElementById('chatPanel').style.display = 'none'; }
        async function sendChatMsg() { const i = document.getElementById('chatInput'); if(!i.value) return; await db.ref('chats/'+currentChatId).push({sender:'student', text:i.value}); i.value=""; }
        function logout() { localStorage.clear(); location.reload(); }
        async function submitBooking() { alert("Booking sent!"); }
        function loadMyBookings() {}
    </script>
</body>
</html>
